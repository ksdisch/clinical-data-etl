services:
  postgres:
    image: postgres:16
    container_name: clinical_etl_db
    environment:
      POSTGRES_DB: clinical_etl
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etl_pass}
    ports:
      # Host port is configurable (defaults to 5432) so a machine where 5432 is
      # already taken can override it via POSTGRES_PORT in .env. Container port
      # stays 5432. See .env / .env.example.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d clinical_etl"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
