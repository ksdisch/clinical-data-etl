version: 2

models:
  - name: fct_claims
    description: >
      Central fact table. One row per claim (inpatient or outpatient),
      enriched with beneficiary age_at_claim. Join to dim_beneficiary
      on bene_id and dim_provider on provider_id.
    columns:
      - name: claim_id
        description: "Unique claim identifier"
        tests:
          - unique
          - not_null
      - name: bene_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_beneficiary')
                field: bene_id
              config:
                severity: warn  # 30 beneficiaries rejected by pandera validation
      - name: provider_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_provider')
                field: provider_id
      - name: claim_type
        description: "'inpatient' or 'outpatient' — source table indicator"
        tests:
          - accepted_values:
              arguments:
                values: ['inpatient', 'outpatient']
      - name: claim_start_date
        description: "First date of the claim period"
      - name: claim_end_date
        description: "Last date of the claim period"
      - name: admission_date
        description: "Hospital admission date. NULL for outpatient claims."
      - name: discharge_date
        description: "Hospital discharge date. NULL for outpatient claims."
      - name: claim_duration_days
        description: "claim_end_date minus claim_start_date in days. NULL for outpatient claims."
      - name: reimbursement_amount
        description: "Total Medicare reimbursement for this claim"
      - name: deductible_amount
        description: "Deductible amount applied to this claim"
      - name: age_at_claim
        description: "Beneficiary age in whole years at claim_start_date"

  - name: dim_beneficiary
    description: >
      Beneficiary dimension. One row per beneficiary with demographics,
      chronic condition flags, and chronic_condition_count aggregate.
    columns:
      - name: bene_id
        description: "Unique beneficiary identifier"
        tests:
          - unique
          - not_null
      - name: date_of_birth
        description: "Beneficiary date of birth"
      - name: date_of_death
        description: "Date of death. NULL if beneficiary is alive."
      - name: gender
        description: "'Male' or 'Female' (recoded from source 1/2 in stg_beneficiary)"
      - name: race
        description: "Race category: 'White', 'Black', 'Other', 'Hispanic', or 'Unknown' (recoded from source codes in stg_beneficiary)"
      - name: renal_disease_indicator
        description: "Source pass-through: 'Y' if end-stage renal disease, '0' otherwise"
      - name: has_alzheimers
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_heart_failure
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_kidney_disease
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_cancer
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_obstr_pulmonary
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_depression
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_diabetes
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_ischemic_heart
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_osteoporosis
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_rheumatoid_arthritis
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_stroke
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: chronic_condition_count
        description: "Count of the 11 has_* boolean flags that are true (0–11)"
      - name: total_ip_reimbursement
        description: "Annual Medicare inpatient reimbursement total for this beneficiary"
      - name: total_op_reimbursement
        description: "Annual Medicare outpatient reimbursement total for this beneficiary"

  - name: dim_provider
    description: >
      Provider dimension. One row per provider with fraud label and
      aggregate claim metrics (total_claims, total_reimbursement,
      unique_beneficiaries, avg_reimbursement_per_claim).
    columns:
      - name: provider_id
        description: "Unique provider identifier"
        tests:
          - unique
          - not_null
      - name: is_potential_fraud
        description: "Fraud label from training data. NULL for test-split providers."
      - name: total_claims
        description: "Count of distinct claims linked to this provider across both claim types"
      - name: total_reimbursement
        description: "Sum of reimbursement_amount across all claims linked to this provider"
      - name: unique_beneficiaries
        description: "Count of distinct beneficiaries who had at least one claim with this provider"
      - name: avg_reimbursement_per_claim
        description: "total_reimbursement / total_claims, rounded to 2 decimal places"

  - name: dim_provider_history
    description: >
      SCD Type 2 history of the provider fraud label, built from the
      snap_provider_fraud dbt snapshot. One row per (provider_id, validity
      window); when is_potential_fraud changes the prior row is closed
      (valid_to set) and a new current row opens. Temporal-validity invariants
      (no overlapping windows, exactly one current row per provider) are enforced
      by singular tests in dbt/tests/.
    columns:
      - name: provider_id
        description: "Provider identifier (NOT unique here — one row per version)"
        tests:
          - not_null
      - name: is_potential_fraud
        description: "Fraud label value during this validity window"
      - name: valid_from
        description: "Timestamp this version became effective (dbt_valid_from)"
        tests:
          - not_null
      - name: valid_to
        description: "Timestamp this version was superseded; NULL for the current row"
      - name: is_current
        description: "True for the open/current version of each provider"
        tests:
          - not_null

  # ── Diabetes star (SECONDARY source) ──────────────────────────────────
  - name: fct_encounters
    description: >
      Second fact table (SECONDARY source). One row per hospital encounter
      from the UCI diabetes-readmission data. Incremental like fct_claims.
      Join to dim_patient on patient_nbr and dim_admission_type on
      admission_type_id.
    columns:
      - name: encounter_id
        description: "Unique encounter identifier (grain)"
        tests:
          - unique
          - not_null
      - name: patient_nbr
        description: "Patient identifier (FK to dim_patient)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_patient')
                field: patient_nbr
      - name: admission_type_id
        description: "Admission type code (FK to dim_admission_type)"
        tests:
          - relationships:
              arguments:
                to: ref('dim_admission_type')
                field: admission_type_id
      - name: time_in_hospital
        description: "Length of stay in days (1–14)"
      - name: num_prior_visits
        description: "Prior outpatient + emergency + inpatient visits in the year"
      - name: num_diabetes_meds
        description: "Count of the 23 tracked drugs actively prescribed (0–23)"
      - name: readmitted_status
        description: "3-class readmission outcome: NO / >30 / <30"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NO', '>30', '<30']
      - name: is_readmitted_30d
        description: "True when readmitted within 30 days (readmitted_status = '<30')"
        tests:
          - not_null

  - name: dim_patient
    description: >
      Patient dimension for the diabetes star. One row per patient_nbr;
      demographics from the patient's most recent encounter, plus readmission
      rollups across all of their encounters.
    columns:
      - name: patient_nbr
        description: "Unique patient identifier"
        tests:
          - unique
          - not_null
      - name: race
        description: "Race from the patient's latest encounter (NULL if not recorded)"
      - name: gender
        description: "Gender from the patient's latest encounter"
      - name: latest_age_bracket
        description: "10-year age bracket at the patient's most recent encounter"
      - name: total_encounters
        description: "Number of encounters for this patient"
      - name: num_readmissions_30d
        description: "How many of those encounters were 30-day readmissions"
      - name: readmission_30d_rate
        description: "num_readmissions_30d / total_encounters (0–1, 4 dp)"

  - name: dim_admission_type
    description: >
      Conformed lookup dimension built from the admission_type_mapping seed.
      Labels the admission_type_id integer on fct_encounters.
    columns:
      - name: admission_type_id
        description: "Admission type code (1–8)"
        tests:
          - unique
          - not_null
      - name: admission_type_label
        description: "Human-readable admission type (Emergency, Urgent, …)"
        tests:
          - not_null

  # ── Hospital star (TERTIARY source) ───────────────────────────────────
  - name: fct_hospital_admissions
    description: >
      Third fact table (TERTIARY source). One row per hospital admission from
      the synthetic-hospital length-of-stay dataset. Incremental like fct_claims
      and fct_encounters. Grain is a minted surrogate (admission_id) because the
      source has no usable primary key. Join to dim_hospital_patient on patient_id
      and dim_severity on severity_of_illness; hospital/ward/department codes are
      degenerate dimensions.
    columns:
      - name: admission_id
        description: "Surrogate key = md5(case_id-patientid) (grain)"
        tests:
          - unique
          - not_null
      - name: patient_id
        description: "Patient identifier (FK to dim_hospital_patient)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hospital_patient')
                field: patient_id
      - name: severity_of_illness
        description: "Illness severity (FK to dim_severity)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_severity')
                field: severity_of_illness
      - name: type_of_admission
        description: "Admission type: Emergency / Trauma / Urgent"
        tests:
          - accepted_values:
              arguments:
                values: ['Emergency', 'Trauma', 'Urgent']
      - name: length_of_stay_bracket
        description: "Length-of-stay bracket (analytical target)"
      - name: length_of_stay_days
        description: "Length-of-stay bracket midpoint in days (5–105)"
      - name: is_long_stay
        description: "True when length_of_stay_days > 30"
        tests:
          - not_null
      - name: admission_deposit
        description: "Deposit collected at admission"

  - name: dim_hospital_patient
    description: >
      Patient dimension for the hospital star. One row per patient_id; a
      behavioural rollup (admission counts, average length of stay, deposit
      totals) rather than a demographic dimension, since the synthetic source has
      no stable per-patient demographics.
    columns:
      - name: patient_id
        description: "Unique patient identifier"
        tests:
          - unique
          - not_null
      - name: total_admissions
        description: "Number of admissions for this patient"
      - name: distinct_hospitals
        description: "Number of distinct hospital_codes this patient was admitted to"
      - name: avg_length_of_stay_days
        description: "Mean length-of-stay (day midpoints) across the patient's admissions"
      - name: total_length_of_stay_days
        description: "Sum of length-of-stay (day midpoints) across the patient's admissions"
      - name: total_admission_deposit
        description: "Sum of admission deposits across the patient's admissions"
      - name: avg_admission_deposit
        description: "Mean admission deposit across the patient's admissions"

  - name: dim_severity
    description: >
      Conformed lookup dimension built from the severity_mapping seed. Maps the
      Severity of Illness category to an ordinal rank and a description.
    columns:
      - name: severity_of_illness
        description: "Severity category: Minor / Moderate / Extreme"
        tests:
          - unique
          - not_null
      - name: severity_rank
        description: "Ordinal acuity rank (Minor=1, Moderate=2, Extreme=3)"
        tests:
          - not_null
      - name: severity_description
        description: "Human-readable description of the severity level"
