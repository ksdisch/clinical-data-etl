version: 2

models:
  - name: fct_claims
    description: >
      Central fact table. One row per claim (inpatient or outpatient),
      enriched with beneficiary age_at_claim. Join to dim_beneficiary
      on bene_id and dim_provider on provider_id.
    columns:
      - name: claim_id
        description: "Unique claim identifier"
        tests:
          - unique
          - not_null
      - name: bene_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_beneficiary')
                field: bene_id
              config:
                severity: warn  # 30 beneficiaries rejected by pandera validation
      - name: provider_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_provider')
                field: provider_id
      - name: claim_type
        description: "'inpatient' or 'outpatient' — source table indicator"
        tests:
          - accepted_values:
              arguments:
                values: ['inpatient', 'outpatient']
      - name: claim_start_date
        description: "First date of the claim period"
      - name: claim_end_date
        description: "Last date of the claim period"
      - name: admission_date
        description: "Hospital admission date. NULL for outpatient claims."
      - name: discharge_date
        description: "Hospital discharge date. NULL for outpatient claims."
      - name: claim_duration_days
        description: "claim_end_date minus claim_start_date in days. NULL for outpatient claims."
      - name: reimbursement_amount
        description: "Total Medicare reimbursement for this claim"
      - name: deductible_amount
        description: "Deductible amount applied to this claim"
      - name: age_at_claim
        description: "Beneficiary age in whole years at claim_start_date"

  - name: dim_beneficiary
    description: >
      Beneficiary dimension. One row per beneficiary with demographics,
      chronic condition flags, and chronic_condition_count aggregate.
    columns:
      - name: bene_id
        description: "Unique beneficiary identifier"
        tests:
          - unique
          - not_null
      - name: date_of_birth
        description: "Beneficiary date of birth"
      - name: date_of_death
        description: "Date of death. NULL if beneficiary is alive."
      - name: gender
        description: "'Male' or 'Female' (recoded from source 1/2 in stg_beneficiary)"
      - name: race
        description: "Race category: 'White', 'Black', 'Other', 'Hispanic', or 'Unknown' (recoded from source codes in stg_beneficiary)"
      - name: renal_disease_indicator
        description: "Source pass-through: 'Y' if end-stage renal disease, '0' otherwise"
      - name: has_alzheimers
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_heart_failure
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_kidney_disease
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_cancer
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_obstr_pulmonary
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_depression
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_diabetes
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_ischemic_heart
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_osteoporosis
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_rheumatoid_arthritis
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: has_stroke
        description: "Boolean — true if the beneficiary has this chronic condition (recoded from source 1=yes/2=no in stg_beneficiary)"
      - name: chronic_condition_count
        description: "Count of the 11 has_* boolean flags that are true (0–11)"
      - name: total_ip_reimbursement
        description: "Annual Medicare inpatient reimbursement total for this beneficiary"
      - name: total_op_reimbursement
        description: "Annual Medicare outpatient reimbursement total for this beneficiary"

  - name: dim_provider
    description: >
      Provider dimension. One row per provider with fraud label and
      aggregate claim metrics (total_claims, total_reimbursement,
      unique_beneficiaries, avg_reimbursement_per_claim).
    columns:
      - name: provider_id
        description: "Unique provider identifier"
        tests:
          - unique
          - not_null
      - name: is_potential_fraud
        description: "Fraud label from training data. NULL for test-split providers."
      - name: total_claims
        description: "Count of distinct claims linked to this provider across both claim types"
      - name: total_reimbursement
        description: "Sum of reimbursement_amount across all claims linked to this provider"
      - name: unique_beneficiaries
        description: "Count of distinct beneficiaries who had at least one claim with this provider"
      - name: avg_reimbursement_per_claim
        description: "total_reimbursement / total_claims, rounded to 2 decimal places"

  - name: dim_provider_history
    description: >
      SCD Type 2 history of the provider fraud label, built from the
      snap_provider_fraud dbt snapshot. One row per (provider_id, validity
      window); when is_potential_fraud changes the prior row is closed
      (valid_to set) and a new current row opens. Temporal-validity invariants
      (no overlapping windows, exactly one current row per provider) are enforced
      by singular tests in dbt/tests/.
    columns:
      - name: provider_id
        description: "Provider identifier (NOT unique here — one row per version)"
        tests:
          - not_null
      - name: is_potential_fraud
        description: "Fraud label value during this validity window"
      - name: valid_from
        description: "Timestamp this version became effective (dbt_valid_from)"
        tests:
          - not_null
      - name: valid_to
        description: "Timestamp this version was superseded; NULL for the current row"
      - name: is_current
        description: "True for the open/current version of each provider"
        tests:
          - not_null
