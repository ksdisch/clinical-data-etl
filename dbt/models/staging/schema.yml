version: 2

models:
  - name: stg_beneficiary
    description: "Cleaned beneficiary demographics with snake_case columns, mapped gender/race/chronic conditions."
    columns:
      - name: bene_id
        description: "Unique beneficiary identifier"
        tests:
          - unique
          - not_null
      - name: date_of_birth
        tests:
          - not_null
      - name: gender
        tests:
          - accepted_values:
              arguments:
                values: ['Male', 'Female']
      - name: race
        tests:
          - accepted_values:
              arguments:
                values: ['White', 'Black', 'Other', 'Hispanic', 'Unknown']

  - name: stg_inpatient_claims
    description: "Cleaned inpatient claims with dates cast, duration computed, columns renamed."
    columns:
      - name: claim_id
        description: "Unique claim identifier"
        tests:
          - unique
          - not_null
      - name: bene_id
        tests:
          - not_null
      - name: provider_id
        tests:
          - not_null
      - name: claim_type
        tests:
          - accepted_values:
              arguments:
                values: ['inpatient']
      - name: reimbursement_amount
        description: "Claim reimbursement amount (>= 0)"

  - name: stg_outpatient_claims
    description: "Cleaned outpatient claims. Same structure as inpatient minus admission/discharge dates."
    columns:
      - name: claim_id
        description: "Unique claim identifier"
        tests:
          - unique
          - not_null
      - name: bene_id
        tests:
          - not_null
      - name: provider_id
        tests:
          - not_null
      - name: claim_type
        tests:
          - accepted_values:
              arguments:
                values: ['outpatient']

  - name: stg_providers
    description: "Provider list with fraud label mapped to boolean."
    columns:
      - name: provider_id
        description: "Unique provider identifier"
        tests:
          - unique
          - not_null
      - name: is_potential_fraud
        description: "Fraud label from training data. NULL for test-split providers."

  - name: stg_diabetes_encounters
    description: >
      Cleaned diabetes-readmission encounters (SECONDARY source). One row per
      hospital encounter with snake_case columns, '?' recoded to NULL upstream,
      medication columns de-hyphenated, and boolean derivations for med change,
      diabetes medication, and 30-day readmission.
    columns:
      - name: encounter_id
        description: "Unique encounter identifier (grain of the diabetes star)"
        tests:
          - unique
          - not_null
      - name: patient_nbr
        description: "Patient identifier — repeats across a patient's encounters"
        tests:
          - not_null
      - name: gender
        tests:
          - accepted_values:
              arguments:
                values: ['Female', 'Male', 'Unknown/Invalid']
      - name: readmitted_status
        description: "3-class readmission outcome from source"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NO', '>30', '<30']
      - name: is_readmitted_30d
        description: "True when readmitted_status = '<30' (analytical target)"
        tests:
          - not_null

  - name: stg_hospital_admissions
    description: >
      Cleaned hospital-admissions staging (TERTIARY source). One row per
      admission with snake_case columns. The surrogate admission_id and the
      '20-Nov'->'11-20' Age/Stay recode are done upstream at ingestion; this
      layer renames the space-containing source columns and casts types.
    columns:
      - name: admission_id
        description: "Surrogate key minted at ingest (grain of the hospital star)"
        tests:
          - unique
          - not_null
      - name: case_id
        description: "Recycled source label — NOT unique; kept as a degenerate dim"
        tests:
          - not_null
      - name: patient_id
        description: "Patient identifier — repeats for the small multi-admission cohort"
        tests:
          - not_null
      - name: type_of_admission
        tests:
          - accepted_values:
              arguments:
                values: ['Emergency', 'Trauma', 'Urgent']
      - name: severity_of_illness
        tests:
          - accepted_values:
              arguments:
                values: ['Minor', 'Moderate', 'Extreme']
      - name: length_of_stay_bracket
        description: "Length-of-stay bracket — the analytical target ('11-20' after recode)"
        tests:
          - accepted_values:
              arguments:
                values: ['0-10', '11-20', '21-30', '31-40', '41-50', '51-60', '61-70', '71-80', '81-90', '91-100', 'More than 100 Days']
