version: 2

models:
  - name: stg_beneficiary
    description: "Cleaned beneficiary demographics with snake_case columns, mapped gender/race/chronic conditions."
    columns:
      - name: bene_id
        description: "Unique beneficiary identifier"
        tests:
          - unique
          - not_null
      - name: date_of_birth
        tests:
          - not_null
      - name: gender
        tests:
          - accepted_values:
              arguments:
                values: ['Male', 'Female']
      - name: race
        tests:
          - accepted_values:
              arguments:
                values: ['White', 'Black', 'Other', 'Hispanic', 'Unknown']

  - name: stg_inpatient_claims
    description: "Cleaned inpatient claims with dates cast, duration computed, columns renamed."
    columns:
      - name: claim_id
        description: "Unique claim identifier"
        tests:
          - unique
          - not_null
      - name: bene_id
        tests:
          - not_null
      - name: provider_id
        tests:
          - not_null
      - name: claim_type
        tests:
          - accepted_values:
              arguments:
                values: ['inpatient']
      - name: reimbursement_amount
        description: "Claim reimbursement amount (>= 0)"

  - name: stg_outpatient_claims
    description: "Cleaned outpatient claims. Same structure as inpatient minus admission/discharge dates."
    columns:
      - name: claim_id
        description: "Unique claim identifier"
        tests:
          - unique
          - not_null
      - name: bene_id
        tests:
          - not_null
      - name: provider_id
        tests:
          - not_null
      - name: claim_type
        tests:
          - accepted_values:
              arguments:
                values: ['outpatient']

  - name: stg_providers
    description: "Provider list with fraud label mapped to boolean."
    columns:
      - name: provider_id
        description: "Unique provider identifier"
        tests:
          - unique
          - not_null
      - name: is_potential_fraud
        description: "Fraud label from training data. NULL for test-split providers."

  - name: stg_diabetes_encounters
    description: >
      Cleaned diabetes-readmission encounters (SECONDARY source). One row per
      hospital encounter with snake_case columns, '?' recoded to NULL upstream,
      medication columns de-hyphenated, and boolean derivations for med change,
      diabetes medication, and 30-day readmission.
    columns:
      - name: encounter_id
        description: "Unique encounter identifier (grain of the diabetes star)"
        tests:
          - unique
          - not_null
      - name: patient_nbr
        description: "Patient identifier — repeats across a patient's encounters"
        tests:
          - not_null
      - name: gender
        tests:
          - accepted_values:
              arguments:
                values: ['Female', 'Male', 'Unknown/Invalid']
      - name: readmitted_status
        description: "3-class readmission outcome from source"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NO', '>30', '<30']
      - name: is_readmitted_30d
        description: "True when readmitted_status = '<30' (analytical target)"
        tests:
          - not_null
