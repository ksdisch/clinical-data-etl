version: 2

sources:
  - name: raw
    schema: raw
    description: >
      Raw landing schema for both pipeline sources. PRIMARY: Medicare provider
      fraud-detection data (Kaggle rohitrox/healthcare-provider-fraud-detection-analysis),
      train/test CSV splits merged into one table per entity. SECONDARY: UCI
      diabetes 130-US-hospitals readmission encounters. Row counts below are
      approximate source totals before pandera validation quarantines rejects
      to data/rejected/. All tables carry a first-seen ingested_at audit column.
    tables:
      - name: beneficiary
        description: >
          Medicare beneficiary demographics: DOB/DOD, gender, race,
          state/county, Part A/B coverage months, 11 chronic-condition flags
          (1=yes / 2=no in source), and annual inpatient/outpatient
          reimbursement & deductible totals. ~203K rows (merged train+test).
      - name: inpatient_claims
        description: >
          Inpatient claim records: admission/discharge dates, attending and
          operating physicians, admit diagnosis, up to 10 diagnosis codes, and
          up to 6 procedure codes, plus reimbursement & deductible amounts.
          ~50K rows (merged train+test).
      - name: outpatient_claims
        description: >
          Outpatient claim records. Same structure as inpatient minus
          admission/discharge dates and diagnosis_group_code. ~644K rows
          (merged train+test).
      - name: providers
        description: >
          Provider list keyed by provider_id with the PotentialFraud label.
          Test-split providers (Test-*.csv) have no PotentialFraud column and
          are loaded with a NULL fraud flag. ~6.8K rows (merged train+test).
      - name: diabetes_encounters
        description: >
          SECONDARY source — UCI diabetes 130-US-hospitals readmission data
          (single CSV, 1999–2008). One row per hospital encounter (encounter_id),
          with patient_nbr, demographics, utilisation counts, 23 medication
          columns, and the readmitted outcome (NO / >30 / <30). The source '?'
          missing sentinel is recoded to NULL at ingestion. ~101.8K rows.
      - name: hospital_admissions
        description: >
          TERTIARY source — synthetic hospital admissions (Kaggle
          amulyas/synthetic-hospital-data, the AV Healthcare Analytics II
          length-of-stay dataset, single CSV). One row per admission. The source
          has no usable primary key (case_id is recycled across unrelated
          admissions), so a deterministic surrogate admission_id =
          md5(case_id-patientid) is minted at ingestion. The Excel '20-Nov'
          artifact in Age/Stay is recoded back to the '11-20' bracket. Column
          names keep their source form (incl. spaces); stg_hospital_admissions
          renames to snake_case. 5,000 rows.
