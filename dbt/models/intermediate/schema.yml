version: 2

models:
  - name: int_claims_unified
    description: >
      Union of inpatient and outpatient claims with aligned columns.
      Outpatient rows have NULL admission_date, discharge_date,
      claim_duration_days, and diagnosis_group_code.
    columns:
      - name: claim_id
        description: "Unique claim identifier across both claim types"
        tests:
          - unique
          - not_null
      - name: bene_id
        description: "Beneficiary ID (FK to stg_beneficiary)"
        tests:
          - not_null
      - name: provider_id
        description: "Provider ID (FK to stg_providers)"
        tests:
          - not_null
      - name: claim_type
        description: "'inpatient' or 'outpatient'"
        tests:
          - accepted_values:
              arguments:
                values: ['inpatient', 'outpatient']
      - name: claim_start_date
        description: "Claim start date"
        tests:
          - not_null
      - name: reimbursement_amount
        description: "Claim reimbursement amount"
        tests:
          - not_null

  - name: int_claims_enriched
    description: >
      Unified claims joined to beneficiary demographics.
      Adds gender, race, date_of_birth, age_at_claim, and
      chronic condition flags onto each claim row.
    columns:
      - name: claim_id
        description: "Unique claim identifier"
        tests:
          - unique
          - not_null
      - name: age_at_claim
        description: "Beneficiary age in years at claim_start_date"
      - name: claim_start_date
        description: "Claim start date — must be on or before claim_end_date"
        tests:
          - not_null
